# Auditable functional defaults for synthetic/smoke profiles.  These are planning
# defaults, not universal truths about any passenger.  Baselines are centered on
# common accessible-route guidance such as 36 in / 0.915 m minimum clear width,
# walking-surface running slope around 1:20, cross slope around 1:48, and ramp
# slope around 1:12, then varied by archetype and trip modifiers.
version: v1
resources:
  clear_width_m_baseline: 0.915
  walking_surface_slope_max: 0.05
  cross_slope_max: 0.0208
  ramp_slope_max: 0.0833
archetypes:
  standard_ambulatory:
    mobility:
      device_type: none
      device_width_m: 0.55
      turning_radius_m: 0.6
      max_access_distance_m: [280, 520]
      max_egress_distance_m: [280, 520]
      max_single_segment_m: [160, 320]
      rest_required: false
      max_slope: [0.08, 0.12]
      max_cross_slope: [0.03, 0.05]
      min_clear_width_m: [0.75, 0.95]
      step_free_required: false
      curb_ramp_required: false
      allowed_surfaces: [paved, concrete, asphalt, compacted_gravel]
    wait: {max_wait_exposure_s: [420, 900], shelter_required: false, min_lighting: day_or_lit, identification_modalities_any_of: [audio, haptic, app, visual]}
    interface: {boarding_any_of: [], min_door_width_m: 0.72, min_deployment_clearance_m: 0.7, preferred_door_side: either, max_dwell_time_s: null}
    ride: {max_ride_time_s: 5400, max_peak_accel_mps2: 2.6, max_peak_jerk_mps3: 4.5, max_motion_exposure: 5.0}
    uncertainty: {min_map_confidence: 0.60, max_blockage_risk: 0.45, max_deployment_risk: 0.30, beta_tau: 1.0, missing_policy: fail_closed}
